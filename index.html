<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈페이지</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f8f9fa;
        }

        header {
            width: 100%;
            padding: 20px 0;
            background-color: #ffffff;
            border-bottom: 1px solid #e9ecef;
            text-align: center;
        }

        /* 로고 스타일 설정 */
        .logo-container img {
            width: 192px;  /* 요청하신 192px 규격 적용 */
            height: auto;
            display: block;
            margin: 0 auto;
        }

        main {
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            color: #333;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="로고">
        </div>
    </header>

    <main>
        <h1>새로운 홈페이지에 오신 것을 환영합니다</h1>
        <p>로고 파일이 성공적으로 업데이트되었습니다.</p>
    </main>

</body>
</html>
